name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore UrlShortener.sln

      - name: Build
        run: dotnet build UrlShortener.sln --no-restore -c Release

      - name: Run Tests
        run: dotnet test UrlShortener.sln --no-build -c Release --verbosity normal

      - name: Build Docker image
        run: |
          docker build \
            -f Shorten.Redirect/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/url-shortener:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest \
            .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: loganlee23011
          password: dckr_pat_Rxo_Mlsz-hsPdrBtCb0ni6oada0

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/url-shortener:latest
